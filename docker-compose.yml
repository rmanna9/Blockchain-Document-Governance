version: "3.9"

# ── Shared volumes ─────────────────────────────────────────────────────────────
volumes:
  shared:          # addresses.json + authority public keys
  ipfs-a:          # Helia storage for authority-a
  ipfs-b:          # Helia storage for authority-b
  ipfs-c:          # Helia storage for authority-c
  keys-a:          # RSA keypair for authority-a
  keys-b:          # RSA keypair for authority-b
  keys-c:          # RSA keypair for authority-c

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  consortium:
    driver: bridge

services:

  # ── Ganache — consortium blockchain node ─────────────────────────────────────
  ganache:
    image: trufflesuite/ganache:latest
    container_name: ganache
    networks:
      - consortium
    ports:
      - "8545:8545"
    command: >
      --chain.chainId 31337
      --chain.networkId 31337
      --miner.blockTime 1
      --wallet.totalAccounts 10
      --wallet.defaultBalance 1000
      --wallet.mnemonic "test test test test test test test test test test test junk"
      --host 0.0.0.0
      --port 8545
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8545"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ── Authority A — generates keys before deployer starts ──────────────────────
  authority-a-keygen:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-a-keygen
    networks:
      - consortium
    volumes:
      - keys-a:/data/keys
      - shared:/shared
    environment:
      AUTHORITY_DID:   "did:consortium:authority-a"
      AUTHORITY_ADDR:  "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      ETH_PRIVATE_KEY: "59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      KEYS_DIR:        "/data/keys"
      RPC_URL:         "http://ganache:8545"
    command: node -e "
      const { generateRSAKeyPair } = require('./dist/authority-node/src/crypto.js');
      const fs = require('fs');
      fs.mkdirSync('/data/keys', { recursive: true });
      if (!fs.existsSync('/data/keys/public.pem')) {
        const { privateKey, publicKey } = generateRSAKeyPair();
        fs.writeFileSync('/data/keys/private.pem', privateKey, { mode: 0o600 });
        fs.writeFileSync('/data/keys/public.pem', publicKey);
        fs.writeFileSync('/shared/pk-authority-a.pem', publicKey);
        console.log('Keys generated for authority-a');
      } else {
        const pk = fs.readFileSync('/data/keys/public.pem', 'utf-8');
        fs.writeFileSync('/shared/pk-authority-a.pem', pk);
        console.log('Keys loaded for authority-a');
      }
      "

  authority-b-keygen:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-b-keygen
    networks:
      - consortium
    volumes:
      - keys-b:/data/keys
      - shared:/shared
    environment:
      AUTHORITY_DID:   "did:consortium:authority-b"
      AUTHORITY_ADDR:  "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
      ETH_PRIVATE_KEY: "5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
      KEYS_DIR:        "/data/keys"
    command: node -e "
      const { generateRSAKeyPair } = require('./dist/authority-node/src/crypto.js');
      const fs = require('fs');
      fs.mkdirSync('/data/keys', { recursive: true });
      if (!fs.existsSync('/data/keys/public.pem')) {
        const { privateKey, publicKey } = generateRSAKeyPair();
        fs.writeFileSync('/data/keys/private.pem', privateKey, { mode: 0o600 });
        fs.writeFileSync('/data/keys/public.pem', publicKey);
        fs.writeFileSync('/shared/pk-authority-b.pem', publicKey);
        console.log('Keys generated for authority-b');
      } else {
        const pk = fs.readFileSync('/data/keys/public.pem', 'utf-8');
        fs.writeFileSync('/shared/pk-authority-b.pem', pk);
        console.log('Keys loaded for authority-b');
      }
      "

  authority-c-keygen:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-c-keygen
    networks:
      - consortium
    volumes:
      - keys-c:/data/keys
      - shared:/shared
    environment:
      AUTHORITY_DID:   "did:consortium:authority-c"
      AUTHORITY_ADDR:  "0x90F79bf6EB2c4f870365E785982E1f101E93b906"
      ETH_PRIVATE_KEY: "7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6"
      KEYS_DIR:        "/data/keys"
    command: node -e "
      const { generateRSAKeyPair } = require('./dist/authority-node/src/crypto.js');
      const fs = require('fs');
      fs.mkdirSync('/data/keys', { recursive: true });
      if (!fs.existsSync('/data/keys/public.pem')) {
        const { privateKey, publicKey } = generateRSAKeyPair();
        fs.writeFileSync('/data/keys/private.pem', privateKey, { mode: 0o600 });
        fs.writeFileSync('/data/keys/public.pem', publicKey);
        fs.writeFileSync('/shared/pk-authority-c.pem', publicKey);
        console.log('Keys generated for authority-c');
      } else {
        const pk = fs.readFileSync('/data/keys/public.pem', 'utf-8');
        fs.writeFileSync('/shared/pk-authority-c.pem', pk);
        console.log('Keys loaded for authority-c');
      }
      "

  # ── Deployer — deploy contracts + admit authority containers ─────────────────
  deployer:
    build:
      context: .
      dockerfile: Dockerfile.deployer
    container_name: deployer
    networks:
      - consortium
    volumes:
      - shared:/shared
      - keys-a:/keys-a
      - keys-b:/keys-b
      - keys-c:/keys-c
    environment:
      RPC_URL: "http://ganache:8545"
    depends_on:
      ganache:
        condition: service_healthy
      authority-a-keygen:
        condition: service_completed_successfully
      authority-b-keygen:
        condition: service_completed_successfully
      authority-c-keygen:
        condition: service_completed_successfully

  # ── Authority A ───────────────────────────────────────────────────────────────
  authority-a:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-a
    networks:
      - consortium
    ports:
      - "3001:3000"
    volumes:
      - shared:/shared
      - ipfs-a:/data/ipfs
      - keys-a:/data/keys
    environment:
      RPC_URL:         "http://ganache:8545"
      ADDRESSES_PATH:  "/shared/addresses.json"
      KEYS_DIR:        "/data/keys"
      IPFS_STORAGE:    "/data/ipfs"
      PORT:            "3000"
      AUTHORITY_DID:   "did:consortium:authority-a"
      AUTHORITY_ADDR:  "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      ETH_PRIVATE_KEY: "59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      AUTHORITY_URLS: >
        0x70997970C51812dc3A010C7d01b50e0d17dc79C8=http://authority-a:3000,
        0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC=http://authority-b:3000,
        0x90F79bf6EB2c4f870365E785982E1f101E93b906=http://authority-c:3000
    depends_on:
      deployer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Authority B ───────────────────────────────────────────────────────────────
  authority-b:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-b
    networks:
      - consortium
    ports:
      - "3002:3000"
    volumes:
      - shared:/shared
      - ipfs-b:/data/ipfs
      - keys-b:/data/keys
    environment:
      RPC_URL:         "http://ganache:8545"
      ADDRESSES_PATH:  "/shared/addresses.json"
      KEYS_DIR:        "/data/keys"
      IPFS_STORAGE:    "/data/ipfs"
      PORT:            "3000"
      AUTHORITY_DID:   "did:consortium:authority-b"
      AUTHORITY_ADDR:  "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
      ETH_PRIVATE_KEY: "5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
      AUTHORITY_URLS: >
        0x70997970C51812dc3A010C7d01b50e0d17dc79C8=http://authority-a:3000,
        0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC=http://authority-b:3000,
        0x90F79bf6EB2c4f870365E785982E1f101E93b906=http://authority-c:3000
    depends_on:
      deployer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Authority C ───────────────────────────────────────────────────────────────
  authority-c:
    build:
      context: .
      dockerfile: Dockerfile.authority
    container_name: authority-c
    networks:
      - consortium
    ports:
      - "3003:3000"
    volumes:
      - shared:/shared
      - ipfs-c:/data/ipfs
      - keys-c:/data/keys
    environment:
      RPC_URL:         "http://ganache:8545"
      ADDRESSES_PATH:  "/shared/addresses.json"
      KEYS_DIR:        "/data/keys"
      IPFS_STORAGE:    "/data/ipfs"
      PORT:            "3000"
      AUTHORITY_DID:   "did:consortium:authority-c"
      AUTHORITY_ADDR:  "0x90F79bf6EB2c4f870365E785982E1f101E93b906"
      ETH_PRIVATE_KEY: "7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6"
      AUTHORITY_URLS: >
        0x70997970C51812dc3A010C7d01b50e0d17dc79C8=http://authority-a:3000,
        0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC=http://authority-b:3000,
        0x90F79bf6EB2c4f870365E785982E1f101E93b906=http://authority-c:3000
    depends_on:
      deployer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Client — scenario runner ───────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: client
    networks:
      - consortium
    volumes:
      - shared:/shared
    environment:
      RPC_URL:       "http://ganache:8545"
      ADDRESSES:     "/shared/addresses.json"
      AUTHORITY_URL: "http://authority-a:3000"
      SCENARIO:      "${SCENARIO:-full-lifecycle}"
    depends_on:
      authority-a:
        condition: service_healthy
      authority-b:
        condition: service_healthy
      authority-c:
        condition: service_healthy